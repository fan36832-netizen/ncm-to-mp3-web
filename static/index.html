<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NCM 转 MP3 在线转换</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">在线音频转换</p>
        <h1>NCM 转 MP3</h1>
        <p class="subtitle">
          上传一个 <code>.ncm</code> 音乐文件，转换完成后就能直接下载 <code>.mp3</code>，不用安装额外软件。
        </p>
      </section>

      <section class="panel">
        <label class="dropzone" id="dropzone" for="file-input">
          <input id="file-input" type="file" accept=".ncm" hidden>
          <span class="dropzone-title">把 .ncm 文件拖到这里</span>
          <span class="dropzone-text">或者点击这里，从电脑中选择一个 .ncm 文件</span>
        </label>

        <div class="selection" id="selection">当前还没有选择文件。</div>

        <button class="primary-button" id="convert-button" type="button" disabled>
          开始转换并下载
        </button>

        <p class="status" id="status">上传、转换、下载一步完成，整个过程会尽量保持简单直接。</p>
      </section>

      <section class="tips">
        <div class="tip-card">
          <h2>怎么转换</h2>
          <p>先上传 <code>.ncm</code> 文件，服务端完成解密和转码后，浏览器会自动下载转换好的 MP3。</p>
        </div>
        <div class="tip-card">
          <h2>使用说明</h2>
          <p>当前一次处理一个文件，更适合日常单曲转换。文件越大，上传和转换耗时也会相应增加。</p>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
