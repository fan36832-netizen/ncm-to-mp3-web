<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NCM to MP3</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">在线转换</p>
        <h1>NCM 转 MP3</h1>
        <p class="subtitle">
          上传一个 <code>.ncm</code> 文件，浏览器会直接下载转换好的 <code>.mp3</code> 文件。
        </p>
      </section>

      <section class="panel">
        <label class="dropzone" id="dropzone" for="file-input">
          <input id="file-input" type="file" accept=".ncm" hidden>
          <span class="dropzone-title">把文件拖到这里</span>
          <span class="dropzone-text">或者点这里，从电脑中选择一个 .ncm 文件</span>
        </label>

        <div class="selection" id="selection">当前还没有选择文件。</div>

        <button class="primary-button" id="convert-button" type="button" disabled>
          开始转换并下载
        </button>

        <p class="status" id="status">上传、转换、下载，整个过程会尽量保持简单直接。</p>
      </section>

      <section class="tips">
        <div class="tip-card">
          <h2>怎么工作的</h2>
          <p>页面会把你的 <code>.ncm</code> 文件发到服务器，服务器完成转换后，浏览器会自动下载 MP3 结果。</p>
        </div>
        <div class="tip-card">
          <h2>公网使用</h2>
          <p>想让别人通过网址直接使用，就需要把这个项目部署到云服务器或容器平台上。</p>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
