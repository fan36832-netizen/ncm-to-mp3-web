services:
  - type: web
    name: ncm-to-mp3-web
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /healthz
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 8000
      - key: MAX_UPLOAD_BYTES
        value: 104857600
